name: Build & Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  WIF_PROVIDER: "projects/722064038316/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
  SERVICE_ACCOUNT: "github-actions-sa@raffy-cicd-lab-bf9b4f.iam.gserviceaccount.com"
  REGISTRY: "northamerica-northeast1-docker.pkg.dev/raffy-cicd-lab-bf9b4f/hello-world-app"
  REGION: "northamerica-northeast1"
  PROJECT_ID: "raffy-cicd-lab-bf9b4f"
  PIPELINE: "hello-world-pipeline"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: npm ci && npm run build

      - name: Tests passed
        run: echo "All checks passed"

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker northamerica-northeast1-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t ${{ env.REGISTRY }}/hello-world-app:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ env.REGISTRY }}/hello-world-app:${{ github.sha }}

  create-release:
    name: Create Cloud Deploy Release
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Cloud Deploy release
        run: |
          gcloud deploy releases create release-${{ github.sha }} \
            --delivery-pipeline=${{ env.PIPELINE }} \
            --region=${{ env.REGION }} \
            --images=northamerica-northeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/hello-world-app/hello-world-app=${{ env.REGISTRY }}/hello-world-app:${{ github.sha }} \
            --skaffold-file=skaffold.yaml \
            --source=.

      - name: Release created
        run: |
          echo "Release release-${{ github.sha }} created successfully!"
          echo "Auto-deploying to dev target."
          echo "Check Cloud Deploy console to promote to staging/prod."
